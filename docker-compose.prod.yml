version: '3.8'

services:
  backend:
    build:
      context: ./backend/go
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
    networks:
      - nutrione-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/react
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - nutrione-network
    environment:
      - VITE_API_URL=http://backend:8080
    restart: unless-stopped

networks:
  nutrione-network:
    driver: bridge
